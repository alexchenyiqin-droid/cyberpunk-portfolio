<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2e88"/>
      <stop offset="50%" stop-color="#b537f2"/>
      <stop offset="100%" stop-color="#00fff5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 深紫黑底 + 切角 -->
  <path d="M0 20 L0 0 L80 0 L100 20 L100 100 L20 100 L0 80 Z" fill="#0a0118"/>
  <!-- 故障感的霓虹闭合括号 -->
  <g filter="url(#glow)" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M35 30 L25 30 L25 70 L35 70"/>
    <path d="M65 30 L75 30 L75 70 L65 70"/>
  </g>
  <!-- 中心霓虹点 -->
  <circle cx="50" cy="50" r="3" fill="#ff2e88"/>
</svg>
